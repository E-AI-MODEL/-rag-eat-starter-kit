name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable) with dev tools
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Validate EAT profile and run the eval set
        run: python3 run.py
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v

  # Publishes a single aggregate commit *status* (not just check runs), so
  # watchers and branch-protection rules that poll the legacy status API see
  # success/failure instead of hanging on the default "pending".
  ci-status:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report aggregate commit status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.test.result }}';
            const state = result === 'success' ? 'success' : 'failure';
            const sha = context.payload.pull_request?.head?.sha || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'ci',
              description: `CI ${state} (tests: ${result})`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
