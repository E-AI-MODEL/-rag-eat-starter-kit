name: Release

# Cuts a tagged GitHub Release from main. Runs on GitHub Actions, where GITHUB_TOKEN
# has contents:write — so it can create the tag and release without a local push.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v0.1.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Verify before releasing
        run: |
          ruff check .
          python3 run.py
          python3 -m unittest discover -s tests -p "test_*.py"
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release notes from CHANGELOG
        run: |
          if python3 scripts/changelog_extract.py "${{ steps.ver.outputs.version }}" > notes.md \
             && [ -s notes.md ]; then
            echo "Using CHANGELOG notes for ${{ steps.ver.outputs.version }}."
          else
            echo "No CHANGELOG section found; auto-generating notes." >&2
            rm -f notes.md
          fi
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; nothing to do."
            exit 0
          fi
          if [ -f notes.md ]; then
            gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --notes-file notes.md
          else
            gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes
          fi
